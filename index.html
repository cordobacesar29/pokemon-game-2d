<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <title>Pokemon Battle</title>
</head>
<style>
  * {
    font-family: 'Press Start 2P', cursive;
    box-sizing: border-box;
  }

  body {
    margin: 0;
    overflow: hidden;
    background-color: #000;
  }

  #gameCanvas {
    display: block;
  }

  #divContainer {
    display: inline-block;
    position: relative;
  }

  #overlappingDiv {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    height: 100%;
    background-color: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 10; /* Keeps screen-flash over everything */
  }

  /* Shared styles for both UI plates */
  .health-box {
    position: absolute;
    width: 250px;
    padding: 15px 10px;
    background-color: rgba(255, 255, 255, 0.85);
    border-radius: 10px;
    border: 4px black solid;
    color: #333;
    text-align: center;
  }

  #topHealthBar {
    top: 25px;
    left: 25px;
    position: absolute ;
    display: none; /* Hidden by default, shown during battle */
  }

  #bottomHealthBar {
    bottom: 145px; /* Pushed up so it doesn't overlap the attack bar */
    right: 25px;
    position: absolute ;
    display: none; /* Hidden by default, shown during battle */
  }

  .health-bg {
    width: 100%;
    height: 12px;
    background-color: #ccc;
    border-radius: 6px;
    margin-top: 10px;
    overflow: hidden;
    border: 2px solid #000;
  }

  /* Replaced duplicate IDs with a class for styling */
  .health-fill {
    width: 100%;
    height: 100%;
    background-color: #4caf50;
    transition: width 0.5s ease;
  }

  .health-box h2 {
    margin: 0;
    font-size: 16px;
    color: #000;
  }

  #barAttackInterface {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background-color: rgba(255, 255, 255, 0.9);
    border-top: 4px black solid;
    display: flex;
    justify-content: space-between;
    display: none; /* Hidden by default, shown during battle */
  }

  #attackButtons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    width: 70%;
  }

  #attackButtons button {
    padding: 10px;
    background-color: #fff;
    font-size: 14px;
    cursor: pointer;
    border: 2px solid transparent;
    outline: none;
  }

  #attackButtons button:hover {
    background-color: #ddd;
    color: #000;
  }

  #attackType {
    width: 30%;
    display: flex;
    align-items: center;
    justify-content: center;
    border-left: 4px black solid;
    background-color: #fff;
  }
</style>
<body>

<div id="divContainer">
  <div id="overlappingDiv"></div>
  
  <canvas id="gameCanvas" width="1024" height="576"></canvas>

  <div id="topHealthBar" class="health-box">
    <h2>Draggle</h2>
    <div class="health-bg">
      <div id="draggleHealth" class="health-fill"></div>
    </div>
  </div>

  <div id="bottomHealthBar" class="health-box">
    <h2>Emby</h2>
    <div class="health-bg">
      <div id="embyHealth" class="health-fill"></div>
    </div>
  </div>

  <div id="barAttackInterface">
    <div id="attackButtons">
      <button id="attack1">Tackle</button>
      <button id="attack2">Fireball</button>
    </div>
    <div id="attackType">
      <span style="font-size: 12px; text-align: center;">Attack Type</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="data/collision.js"></script>
<script src="data/battleZones.js"></script>
<script src="index.js"></script>
</body>
</html>
